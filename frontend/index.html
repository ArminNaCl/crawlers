<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EComCrawler</title>
    <!-- Octopus emoji favicon via inline SVG -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐙</text></svg>">
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
    <div class="container">
        <div class="app-header">
            <span class="logo">🐙</span>
            <h1>EComCrawler</h1>
        </div>

        <div class="platform-selection">
            <h2>انتخاب پلتفرم</h2>
            <div class="platforms">
                <button class="platform-btn" data-platform="basalam">باسلام</button>
                <button class="platform-btn" data-platform="emalls">ایلماز</button>
                <button class="platform-btn" data-platform="shopino">شاپینو</button>
                <button class="platform-btn" data-platform="snappshop">اسنپ شاپ</button>
            </div>
        </div>

        <div class="input-section" id="inputSection" style="display: none;">
            <h2 id="selectedPlatform"></h2>
            <div class="form-group">
                <label for="linkInput">لینک را وارد کنید:</label>
                <input type="text" id="linkInput" placeholder="https://...">
            </div>
            <button class="submit-btn" id="submitBtn">استخراج</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>در حال پردازش...</p>
            <pre id="logBox" class="log-box"></pre>
        </div>

        <div class="result-section" id="resultSection" style="display: none;">
            <h2>نتیجه</h2>
            <p id="resultMessage"></p>
            <!-- shown in browser mode -->
            <div id="downloadLinks"></div>
            <!-- shown in pywebview/Windows mode -->
            <div id="folderSection" style="display:none;">
                <p class="save-path" id="savePath"></p>
                <button class="open-folder-btn" id="openFolderBtn">📂 باز کردن پوشه</button>
            </div>
        </div>
    </div>

    <script src="./static/script.js"></script>
</body>
</html>
