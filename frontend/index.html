<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EComCrawler</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐙</text></svg>">
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>
    <div class="container">

        <header class="app-header">
            <span class="logo">🐙</span>
            <div>
                <h1>EComCrawler</h1>
                <p class="tagline">Product data extractor</p>
            </div>
        </header>

        <div class="divider"></div>

        <section class="platform-section">
            <label class="section-label">Select Platform</label>
            <div class="platforms">
                <button class="platform-btn" data-platform="basalam">Basalam</button>
                <button class="platform-btn" data-platform="emalls">Emalls</button>
                <button class="platform-btn" data-platform="shopino">Shopino</button>
                <button class="platform-btn" data-platform="snappshop">SnappShop</button>
            </div>
        </section>

        <section class="url-section" id="urlSection" style="display:none;">
            <label class="section-label" id="platformLabel"></label>
            <div class="url-row">
                <input type="text" id="linkInput" placeholder="https://...">
                <button class="extract-btn" id="submitBtn">Extract</button>
            </div>
        </section>

        <section class="status-section" id="statusSection" style="display:none;">
            <div class="status-row">
                <div class="spinner"></div>
                <span id="statusText">Extracting products...</span>
            </div>
            <pre id="logBox" class="log-box"></pre>
        </section>

        <section class="result-section" id="resultSection" style="display:none;">
            <p id="resultMessage"></p>
            <div id="downloadLinks"></div>
            <div id="folderSection" style="display:none;">
                <p class="save-path" id="savePath"></p>
                <button class="open-folder-btn" id="openFolderBtn">📂 Open Folder</button>
            </div>
        </section>

    </div>
    <script src="./static/script.js"></script>
</body>
</html>
