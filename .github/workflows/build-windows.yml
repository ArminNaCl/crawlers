name: Build Windows EXE

# Triggers:
#   - Push a version tag  (git tag v1.0.0 && git push --tags)
#   - Manual run from the GitHub Actions tab
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate app icon
        run: python create_icon.py

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: EComCrawler-windows
          path: dist/EComCrawler.exe
          if-no-files-found: error

      # Also attach the EXE to a GitHub Release when triggered by a tag
      - name: Create GitHub Release and attach EXE
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EComCrawler.exe
